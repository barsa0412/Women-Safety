{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SheSecure Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#546B41,#99AD7A);
    font-family:'Poppins', sans-serif;
}

/* Navbar */

.navbar{
    width:100%;
    padding:18px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

.nav-left{
    display:flex;
    align-items:center;
    gap:12px;
    color:white;
    font-weight:600;
    font-size:22px;
}

.nav-logo{
    width:45px;
}

.nav-center{
    display:flex;
    gap:30px;
}

.nav-center a,
.nav-right a{
    text-decoration:none;
    color:white;
    font-weight:500;
    transition:0.3s;
}

.nav-center a:hover,
.nav-right a:hover{
    color:#e8f5d5;
}

/* Main Wrapper */

.main-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

/* Container */

.container{
    width:100%;
    max-width:1200px;
    display:flex;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

/* Left Section */

.left-section{
    width:50%;
    padding:50px;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo{
    width:300px;
    margin-bottom:20px;
}

.left-section h1{
    font-size:48px;
    margin-bottom:18px;
    font-family:'Playfair Display', serif;
    font-style:italic;
}

.left-section p{
    font-size:18px;
    line-height:1.8;
    max-width:500px;
    font-family:'Playfair Display', serif;
    font-style:italic;
}

/* Right Section */

.right-section{
    width:50%;
    background:white;
    padding:50px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card */

.card{
    width:100%;
    max-width:350px;
}

.card h2{
    text-align:center;
    color:#546B41;
    margin-bottom:20px;
    font-family:'Playfair Display', serif;
    font-style:italic;
}

input{
    width:100%;
    padding:13px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#f3f3f3;
    outline:none;
    font-size:15px;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:#546B41;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#435535;
}

.register-link{
    text-align:center;
    margin-top:15px;
}

.register-link a{
    color:#546B41;
    font-weight:bold;
    text-decoration:none;
}

/* Responsive */

@media(max-width:900px){

    .container{
        flex-direction:column;
    }

    .left-section,
    .right-section{
        width:100%;
    }

    .nav-center{
        display:none;
    }

    .left-section{
        text-align:center;
        align-items:center;
    }

    .logo{
        width:220px;
    }
}

</style>
</head>
<body>

<!-- Navbar -->

<div class="navbar">

    <div class="nav-left">
        <img src="{% static 'images/logoE.png' %}" class="nav-logo" alt="logo">
        SheSecure
    </div>

    <div class="nav-center">
        <a href="/home/">Home</a>
        <a href="/featuress/">Featuress</a>
        <a href="/contact/">Contact</a>
    </div>

    <div class="nav-right">
        <a href="/register/">Register</a>
    </div>

</div>

<!-- Main Content -->

<div class="main-wrapper">

<div class="container">

    <div class="left-section">

        <img src="{% static 'images/logo.png' %}" class="logo" alt="logo">

        <h1>SheSecure</h1>

        <p>
            Protecting women through smart digital safety tools, emergency alerts, and secure support systems 🌿
        </p>

    </div>

    <div class="right-section">

        <div class="card">

            <h2>Login</h2>

            <form method="POST">

                {% csrf_token %}

                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Login</button>

            </form>

            <div class="register-link">
                Don't have an account?
                <a href="/register/">Create Account</a>
            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>
