<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SheSecure Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#ff4e8a,#7a5cff);

animation:bgmove 10s infinite alternate;

color:white;

}

@keyframes bgmove{
0%{background-position:left;}
100%{background-position:right;}
}

/* App Title */

.app-title{
text-align:center;
margin-bottom:25px;
}

.app-title h1{
font-size:40px;
font-weight:bold;
}

.app-title p{
font-size:16px;
opacity:0.9;
}

/* Card */

.card{

background:rgba(255,255,255,0.15);

backdrop-filter:blur(10px);

padding:40px;

border-radius:15px;

width:350px;

box-shadow:0 8px 30px rgba(0,0,0,0.2);

}

.card h2{
text-align:center;
margin-bottom:20px;
}

/* Inputs */

input{

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:8px;

outline:none;

}

/* Button */

button{

width:100%;

padding:12px;

border:none;

background:#ff2d55;

color:white;

border-radius:8px;

font-size:16px;

cursor:pointer;

margin-top:10px;

}

button:hover{
background:#e60039;
}

/* Link */

a{

color:white;

display:block;

text-align:center;

margin-top:15px;

text-decoration:none;

}

</style>

</head>

<body>

<!-- App Title -->

<div class="app-title">

<h1>🛡 SheSecure</h1>

<p>Women Safety Application</p>

</div>

<!-- Login Card -->

<div class="card">

<h2>Login</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a href="/register/">Create account</a>

</div>

</body>

</html>
